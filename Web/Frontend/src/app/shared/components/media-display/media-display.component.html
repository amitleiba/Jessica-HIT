<div
  class="media-display-container w-full h-full flex align-items-center justify-content-center"
>
  <div
    class="media-wrapper w-full h-full flex align-items-center justify-content-center"
  >
    @if (mediaData) {
      @if (mediaType === 'stream') {
        <!-- Live MJPEG stream from camera -->
        <img [src]="mediaData" alt="Live camera feed" class="media-content stream-feed" />
      } @else if (mediaType === 'image') {
        <img [src]="mediaData" alt="Media display" class="media-content" />
      } @else {
        <video [src]="mediaData" class="media-content" controls></video>
      }
    } @else {
    <div class="no-media w-full h-full flex flex-column align-items-center justify-content-center">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--text-color-secondary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22"></path>
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h3l2-3h4l1 1.5"></path>
        <path d="M21 7a2 2 0 0 1 2 2v2"></path>
        <circle cx="12" cy="13" r="4"></circle>
      </svg>
      <p class="no-media-text mt-3 text-lg font-medium" style="color: var(--text-color-secondary)">Camera Offline</p>
    </div>
    }
  </div>
</div>
