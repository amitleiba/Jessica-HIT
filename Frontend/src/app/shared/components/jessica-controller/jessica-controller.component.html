<div class="jessica-controller-container">
  <!-- Top Half: Media Display -->
  <div class="media-section">
    <app-media-display [mediaData]="mediaData" [mediaType]="mediaType"></app-media-display>
  </div>

  <!-- Bottom Half: Control Panel -->
  <div class="control-section flex flex-column align-items-center gap-3 w-full">
    <app-control-panel (directionChange)="onDirectionChange($event)"></app-control-panel>
  </div>
</div>
